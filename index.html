<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>松田悟志 Official Radio Hub</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --accent-color: #38bdf8;
            --accent-hover: #7dd3fc;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .hub-container {
            text-align: center;
            max-width: 600px;
            width: 90%;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* アニメーションする音声ウェーブ風の装飾 */
        .logo-area {
            margin-bottom: 30px;
            position: relative;
            display: inline-block;
        }

        .logo-icon {
            font-size: 3.5rem;
            color: var(--accent-color);
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 15px var(--accent-color)); }
            100% { transform: scale(1); opacity: 0.9; }
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            margin: 0 0 10px 0;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 1rem;
            color: var(--text-sub);
            margin-bottom: 50px;
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        /* メインリンクボタン */
        .main-link-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 16px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            text-decoration: none;
            display: block;
        }

        .main-link-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: 0 15px 40px rgba(56, 189, 248, 0.15);
        }

        .card-label {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--accent-color);
            background: rgba(56, 189, 248, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 1.4rem;
            color: var(--text-main);
            margin: 0 0 10px 0;
            font-weight: 600;
        }

        .card-desc {
            font-size: 0.9rem;
            color: var(--text-sub);
            margin: 0;
            line-height: 1.6;
        }

        .arrow-icon {
            margin-top: 15px;
            font-size: 1.2rem;
            color: var(--accent-color);
            transition: transform 0.3s ease;
        }

        .main-link-card:hover .arrow-icon {
            transform: translateX(5px);
        }

        footer {
            margin-top: 60px;
            font-size: 0.8rem;
            color: rgba(148, 163, 184, 0.5);
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

<div class="hub-container">
    <header>
        <div class="logo-area">
            <!-- ラジオや音声を象徴するアイコン（絵文字） -->
            <div class="logo-icon">🎙️</div>
        </div>
        <h1>SATOSHI MATSUDA</h1>
        <div class="tagline">Official Radio & Creative Hub</div>
    </header>

    <main>
        <!-- 文字起こしページへのリンクカード -->
        <a href="radio_log.html" class="main-link-card">
            <span class="card-label">Latest Radio Log</span>
            <div class="card-title">さとべぇRADIO 文字起こし</div>
            <p class="card-desc">
                5月16日配信回：SNSでの驚きの反響と、自叙伝小説『仮面ライダーのなり方』英訳プロジェクトへの新たな決意について。
            </p>
            <div class="arrow-icon">Listen with Text ➔</div>
        </a>
    </main>

    <footer>
        &copy; SATOSHI MATSUDA All Rights Reserved.
    </footer>
</div>

</body>
</html>
