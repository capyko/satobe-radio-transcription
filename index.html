<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>さとべぇRADIO Transcript Archive</title>
    <style>
        :root {
            /* 落ち着いた知性を感じる非常に深いネイビーブラック */
            --bg-color: #0b0f19;
            --text-main: #f8fafc;
            --text-sub: #64748b;
            --line-color: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            width: 85%;
            padding: 20px 0;
        }

        header {
            margin-bottom: 60px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            margin: 0 0 8px 0;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-sub);
            letter-spacing: 0.08em;
            margin: 0;
        }

        nav {
            border-top: 1px solid var(--line-color);
        }

        .nav-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 0;
            color: var(--text-main);
            text-decoration: none;
            border-bottom: 1px solid var(--line-color);
            transition: opacity 0.2s ease;
        }

        .nav-link:hover {
            opacity: 0.6;
        }

        .link-title {
            font-size: 1rem;
            letter-spacing: 0.05em;
        }

        .link-date {
            font-size: 0.8rem;
            color: var(--text-sub);
            font-variant-numeric: tabular-nums;
        }

        footer {
            margin-top: 80px;
            font-size: 0.75rem;
            color: var(--text-sub);
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>さとべぇRADIO♪ Transcript Archive</h1>
        <p class="subtitle">A Japanese podcast by Matsuda Satoshi (松田悟志)</p>
    </header>

    <main>
        <nav>
            <!-- リンクの要素。今後アーカイブが増えたらこのaタグを下に複製していけます -->
            <a href="20260516.html" class="nav-link">
                <span class="link-title">『世界中からのコメントが！』</span>
                <span class="link-date">2026.05.16</span>
            </a>
        </nav>
    </main>

    <footer>
        <p>&copy; さとべぇRADIO All Rights Reserved.</p>
    </footer>
</div>

</body>
</html>
